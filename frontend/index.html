<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>سکوبات — SakkouBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* Default tokens (light honey) — overridden by JS once the active theme
       is applied. Kept here only so the very first paint isn't naked. */
    :root {
      --bg: #f8f5ed;
      --surface: #ffffff;
      --surface-2: #f0ede3;
      --surface-3: #e4e0d3;
      --border: rgba(24,22,18,0.08);
      --border-strong: rgba(24,22,18,0.16);
      --text: #181612;
      --text-muted: #6a6357;
      --text-faint: #a89e8c;
      --accent: #c9921a;
      --accent-fg: #ffffff;
      --accent-soft: rgba(201,146,26,0.12);
      --accent-on-soft: #8a6210;
      --user-bubble: #181612;
      --user-bubble-fg: #f8f5ed;

      /* Spacing scale — fixed (density tweak removed) */
      --pad-page: 24px;
      --msg-gap: 14px;
      --bubble-pad-y: 12px;
      --bubble-pad-x: 16px;
      --bubble-radius: 18px;
      --fs-body: 15px;
      --fs-meta: 12px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Vazirmatn', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: var(--fs-body);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      transition: background-color .25s ease, color .25s ease;
      overscroll-behavior: none;
    }
    #root { min-height: 100%; display: flex; flex-direction: column; }
    button { font-family: inherit; cursor: pointer; }

    /* Subtle background tint, derived from the active theme's accent. */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: radial-gradient(circle at 50% 0%, var(--accent-soft) 0%, transparent 60%);
      pointer-events: none;
      opacity: 0.5;
      z-index: 0;
      transition: background-image .3s;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border-strong); border-radius: 999px;
      border: 2px solid transparent; background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); background-clip: content-box; border: 2px solid transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="./config.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="selector.jsx"></script>
  <script type="text/babel" src="chat.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
